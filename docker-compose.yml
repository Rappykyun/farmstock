services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-farmstock}-app
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-8080}:80"
    volumes:
      - laravel-storage:/var/www/html/storage

  queue:
    image: ${COMPOSE_PROJECT_NAME:-farmstock}-app
    restart: unless-stopped
    profiles:
      - worker
    env_file:
      - .env.docker
    environment:
      RUN_MIGRATIONS: "false"
    command:
      - php
      - artisan
      - queue:work
      - --verbose
      - --tries=3
      - --timeout=90
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - laravel-storage:/var/www/html/storage

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-farmstock}
      MYSQL_USER: ${DB_USERNAME:-farmstock}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - 127.0.0.1
        - -uroot
        - -p${DB_ROOT_PASSWORD:-rootpass}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  laravel-storage:
  mysql-data: 