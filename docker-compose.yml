services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-farmstock}-app
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - laravel-storage:/var/www/html/storage

  queue:
    image: ${COMPOSE_PROJECT_NAME:-farmstock}-app
    restart: unless-stopped
    profiles:
      - worker
    env_file:
      - .env.docker
    environment:
      RUN_MIGRATIONS: "false"
    command:
      - php
      - artisan
      - queue:work
      - --verbose
      - --tries=3
      - --timeout=90
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - laravel-storage:/var/www/html/storage

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-farmstock}
      POSTGRES_USER: ${DB_USERNAME:-farmstock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${DB_USERNAME:-farmstock} -d ${DB_DATABASE:-farmstock}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  laravel-storage:
  postgres-data:
